<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Messages</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { padding: 40px 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .admin-header h1 { color: var(--text-primary); }
        .back-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 16px; border-radius: 4px; text-decoration: none; }
        .back-btn:hover { background: rgba(255,255,255,0.1); }
        .messages-grid { display: grid; gap: 20px; }
        .msg-card { background: var(--card-bg); border: 1px solid var(--border-color); backdrop-filter: var(--glass-backdrop); border-radius: 8px; padding: 20px; }
        .msg-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .msg-sender { font-weight: bold; color: var(--accent-primary); font-size: 1.1rem; }
        .msg-email { color: var(--text-secondary); font-size: 0.9rem; margin-left: 10px; }
        .msg-date { font-size: 0.8rem; color: var(--text-secondary); }
        .msg-subject { font-weight: 600; color: var(--text-primary); margin-bottom: 10px; font-size: 1.05rem; }
        .msg-body { color: var(--text-primary); line-height: 1.5; white-space: pre-wrap; font-size: 0.95rem; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 4px; }
        .no-msg { text-align: center; color: var(--text-secondary); font-size: 1.2rem; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <h1><i class="fas fa-inbox"></i> Inbox (Contact Form)</h1>
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        </div>
        <div id="messages-container" class="messages-grid">
            <div class="no-msg"><i class="fas fa-spinner fa-spin"></i> Loading messages...</div>
        </div>
    </div>

    <script>
        async function fetchMessages() {
            const container = document.getElementById('messages-container');
            try {
                const response = await fetch('/api/messages');
                const messages = await response.json();

                if (messages.length === 0) {
                    container.innerHTML = '<div class="no-msg">No messages received yet.</div>';
                    return;
                }

                container.innerHTML = messages.map(msg => `
                    <div class="msg-card">
                        <div class="msg-header">
                            <div>
                                <span class="msg-sender"><i class="fas fa-user-circle"></i> ${msg.name}</span>
                                <a href="mailto:${msg.email}" class="msg-email"><i class="fas fa-envelope"></i> ${msg.email}</a>
                            </div>
                            <span class="msg-date"><i class="fas fa-clock"></i> ${new Date(msg.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="msg-subject">Subject: ${msg.subject}</div>
                        <div class="msg-body">${msg.message}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="no-msg" style="color: #ef4444;">Failed to load messages. Make sure the server is running.</div>';
            }
        }

        // Load messages on page load
        fetchMessages();
    </script>
</body>
</html>
